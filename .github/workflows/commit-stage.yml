name: Commit Stage
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true
          cache-dependency-path: go.sum

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y make

      - name: Verify Go formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Code is not formatted. Run 'go fmt ./...'"
            gofmt -s -l .
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=5m

      - name: Build application
        run: go build -v ./...

      - name: Run unit tests
        run: make test-ci

      - name: Go vulnerability check
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: 'go.mod'

      - name: Install Grype and update DB
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype db update

      - name: Code vulnerability scanning
        uses: anchore/scan-action@v4
        id: scan
        with:
          path: "."
          fail-build: false
          severity-cutoff: high
          output-format: sarif

      - name: Validate SARIF file
        id: validate_sarif
        if: always()
        run: |
          SARIF_FILE="${{ steps.scan.outputs.sarif }}"
          if [ -f "$SARIF_FILE" ] && [ -s "$SARIF_FILE" ]; then
            if jq empty "$SARIF_FILE" 2>/dev/null; then
              echo "valid=true" >> $GITHUB_OUTPUT
              echo "SARIF file is valid"
            else
              echo "valid=false" >> $GITHUB_OUTPUT
              echo "SARIF file exists but is not valid JSON"
            fi
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "SARIF file does not exist or is empty"
          fi

      - name: Upload vulnerability results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: steps.validate_sarif.outputs.valid == 'true'
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
